name: Apply Prometheus Retention Limits

on:
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  SSH_KEY_PATH: /tmp/vps_ssh_key

jobs:
  apply:
    name: Apply Prometheus Limits
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply retention limits and restart
        run: |
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            root@"$VPS_HOST" 'bash -s' <<'SCRIPT'
          set -euo pipefail
          COMPOSE_FILE="/opt/coroot/docker-compose.yml"

          echo "=== Before ==="
          grep -A 20 'prometheus:' "$COMPOSE_FILE" | head -25
          echo ""

          # Add retention flags if not already present
          if grep -q "storage.tsdb.retention.size" "$COMPOSE_FILE"; then
            echo "Retention size already configured, skipping."
          else
            # Insert retention flags after the last existing prometheus command flag
            sed -i '/--web.enable-remote-write-receiver/a\      - "--storage.tsdb.retention.size=4GB"\n      - "--storage.tsdb.retention.time=30d"' "$COMPOSE_FILE"
            echo "Added retention limits: size=4GB, time=30d"
          fi

          echo ""
          echo "=== After ==="
          grep -A 25 'prometheus:' "$COMPOSE_FILE" | head -30
          echo ""

          echo "=== Restarting Prometheus ==="
          docker compose -p coroot -f "$COMPOSE_FILE" up -d prometheus
          echo ""

          echo "=== Waiting for health check ==="
          for i in $(seq 1 20); do
            sleep 5
            health=$(docker compose -p coroot -f "$COMPOSE_FILE" ps prometheus 2>/dev/null | grep -c "(healthy)" || true)
            if [ "$health" -gt 0 ] 2>/dev/null; then
              echo "  Prometheus is healthy after ${i}x5s"
              break
            fi
            echo "  Attempt $i/20 — waiting..."
          done

          echo ""
          echo "=== Memory after restart ==="
          docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}" 2>/dev/null
          echo ""
          echo "=== Done ==="
          SCRIPT

      - name: Cleanup SSH
        if: always()
        run: rm -f "$SSH_KEY_PATH"
