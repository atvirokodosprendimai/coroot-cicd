name: Restart Services

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to restart (all, coroot, clickhouse, prometheus, caddy)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - coroot
          - clickhouse
          - prometheus
          - caddy
      mode:
        description: "Restart mode"
        required: true
        default: "recreate"
        type: choice
        options:
          - recreate
          - restart

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  SSH_KEY_PATH: /tmp/vps_ssh_key

jobs:
  restart:
    name: Restart ${{ inputs.service }} (${{ inputs.mode }})
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Restart service
        run: |
          SERVICE="${{ inputs.service }}"
          MODE="${{ inputs.mode }}"

          # Build the restart command
          if [ "$MODE" = "recreate" ]; then
            if [ "$SERVICE" = "all" ]; then
              CMD="docker compose down && docker compose up -d"
            else
              CMD="docker compose up -d --force-recreate $SERVICE"
            fi
          else
            if [ "$SERVICE" = "all" ]; then
              CMD="docker compose restart"
            else
              CMD="docker compose restart $SERVICE"
            fi
          fi

          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            root@"$VPS_HOST" "set +e; cd /opt/coroot; echo '=== BEFORE ==='; docker ps --format 'table {{.Names}}\t{{.Status}}'; echo '=== EXECUTING: $CMD ==='; $CMD; echo 'Waiting 30s...'; sleep 30; echo '=== AFTER ==='; docker ps --format 'table {{.Names}}\t{{.Status}}'; echo '=== HEALTH ==='; curl -sf -o /dev/null -w 'table.beerpub.dev: HTTP %{http_code}\n' https://table.beerpub.dev/ || echo 'table.beerpub.dev: FAIL'; curl -sf -o /dev/null -w 'coroot.beerpub.dev: HTTP %{http_code}\n' https://coroot.beerpub.dev/ || echo 'coroot.beerpub.dev: FAIL'"

      - name: Cleanup SSH
        if: always()
        run: rm -f "$SSH_KEY_PATH"
