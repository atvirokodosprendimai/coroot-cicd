name: Restart Services

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to restart (all, coroot, clickhouse, prometheus, caddy)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - coroot
          - clickhouse
          - prometheus
          - caddy

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  SSH_KEY_PATH: /tmp/vps_ssh_key

jobs:
  restart:
    name: Restart ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Restart service
        run: |
          SERVICE="${{ inputs.service }}"
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            root@"$VPS_HOST" "cd /opt/coroot && docker ps --format 'table {{.Names}}\t{{.Status}}' | grep -E 'coroot|caddy|click|prom' && echo '=== RESTARTING $SERVICE ===' && docker compose restart $SERVICE && echo 'Waiting 30s...' && sleep 30 && docker ps --format 'table {{.Names}}\t{{.Status}}' | grep -E 'coroot|caddy|click|prom' && echo '=== HEALTH ===' && curl -sf -o /dev/null -w 'coroot.beerpub.dev: HTTP %{http_code}\n' https://coroot.beerpub.dev/ || echo 'coroot.beerpub.dev: FAIL'"

      - name: Cleanup SSH
        if: always()
        run: rm -f "$SSH_KEY_PATH"
