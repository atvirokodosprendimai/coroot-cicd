name: Disk Recovery

on:
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  SSH_KEY_PATH: /tmp/vps_ssh_key

jobs:
  recover:
    name: Cleanup and Restart
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Cleanup and restart
        run: |
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            root@"$VPS_HOST" 'bash -s' <<'SCRIPT'
          set +e
          echo "=== BEFORE ==="
          df -h /

          echo "--- Removing ALL backups ---"
          rm -rf /opt/coroot/backups/*

          echo "--- Removing staging ---"
          rm -rf /opt/coroot-staging

          echo "--- Removing temp files ---"
          find /tmp -name "*.tar.gz" -delete 2>/dev/null
          find /opt -name "*.tar.gz.tmp" -delete 2>/dev/null

          echo "--- Orphan volumes ---"
          for vol in coroot_coroot-data coroot_caddy-data coroot_caddy-config; do
            docker volume rm "$vol" 2>/dev/null && echo "Removed $vol"
          done

          echo "--- Docker prune ---"
          docker system prune -af

          echo "--- System cleanup ---"
          apt-get clean 2>/dev/null
          journalctl --vacuum-size=50M 2>/dev/null
          find /var/log -name "*.gz" -delete 2>/dev/null
          find /var/log -name "*.old" -delete 2>/dev/null
          find /var/log -name "*.1" -delete 2>/dev/null

          echo "=== AFTER CLEANUP ==="
          df -h /

          echo "=== RESTART ==="
          cd /opt/coroot
          docker compose pull 2>&1 || echo "Pull failed"
          docker compose up -d

          echo "=== WAITING ==="
          for i in $(seq 1 36); do
            sleep 5
            cs=$(docker inspect --format='{{.State.Health.Status}}' coroot-coroot-1 2>/dev/null || echo "?")
            ch=$(docker inspect --format='{{.State.Health.Status}}' coroot-clickhouse-1 2>/dev/null || echo "?")
            pr=$(docker inspect --format='{{.State.Health.Status}}' coroot-prometheus-1 2>/dev/null || echo "?")
            echo "[$i/36] coroot=$cs ch=$ch prom=$pr"
            [ "$cs" = "healthy" ] && echo "RECOVERED!" && break
          done

          echo "=== STATUS ==="
          docker ps -a --format "table {{.Names}}	{{.Status}}"
          df -h /
          curl -sf -o /dev/null -w "HTTP %{http_code}
" https://table.beerpub.dev/ || echo "still down"
          SCRIPT

      - name: Cleanup SSH
        if: always()
        run: rm -f "$SSH_KEY_PATH"
