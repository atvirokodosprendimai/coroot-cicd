name: VPS Diagnostics

on:
  workflow_dispatch:
    inputs:
      reboot_if_unreachable:
        description: "Reboot server via Hetzner API if SSH is unreachable"
        required: false
        default: "true"
        type: boolean

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  SSH_KEY_PATH: /tmp/vps_ssh_key

jobs:
  diagnose:
    name: Run VPS Diagnostics
    runs-on: ubuntu-latest
    outputs:
      ssh_ok: ${{ steps.ssh_test.outputs.ssh_ok }}
      rebooted: ${{ steps.reboot.outputs.rebooted }}
    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        id: ssh_test
        run: |
          if ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -o BatchMode=yes root@"$VPS_HOST" 'echo ok' 2>/dev/null; then
            echo "ssh_ok=true" >> "$GITHUB_OUTPUT"
            echo "SSH connection successful"
          else
            echo "ssh_ok=false" >> "$GITHUB_OUTPUT"
            echo "SSH connection failed"
          fi

      - name: Reboot via Hetzner API
        id: reboot
        if: steps.ssh_test.outputs.ssh_ok == 'false' && inputs.reboot_if_unreachable
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_ADMIN_TOKEN }}
        run: |
          echo "SSH unreachable — finding server via Hetzner API..."

          # Find server by IP
          servers_json=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers")

          server_id=$(echo "$servers_json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for s in data['servers']:
              ip = s['public_net']['ipv4']['ip']
              print(f\"  Found: {s['name']} (id={s['id']}, ip={ip})\", file=sys.stderr)
              # We don't know the exact IP from the secret, so take the first server
              # For single-server setups this is correct
          # Print the first server ID
          if data['servers']:
              print(data['servers'][0]['id'])
          ")

          if [ -z "$server_id" ]; then
            echo "ERROR: No servers found in Hetzner account"
            exit 1
          fi

          echo "Requesting hard reset for server ID $server_id..."
          reboot_resp=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$server_id/actions/reset")
          http_code=$(echo "$reboot_resp" | grep "HTTP_CODE:" | cut -d: -f2)
          body=$(echo "$reboot_resp" | grep -v "HTTP_CODE:")
          echo "  HTTP $http_code"
          echo "$body" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f\"  Action: {d.get('action',{}).get('status','unknown')}\")" 2>/dev/null || echo "  Response: $body"
          if [ "$http_code" -ge 400 ] 2>/dev/null; then
            echo "ERROR: Hetzner API returned $http_code"
            exit 1
          fi

          echo "rebooted=true" >> "$GITHUB_OUTPUT"
          echo "Waiting 60s for server to come back..."
          sleep 60

          # Wait for SSH to become available (up to 3 min)
          for i in $(seq 1 12); do
            if ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -o BatchMode=yes root@"$VPS_HOST" 'echo ok' 2>/dev/null; then
              echo "Server is back after reboot"
              # Re-scan host keys after reboot
              ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
              break
            fi
            echo "  Attempt $i/12 — not ready yet, waiting 15s..."
            sleep 15
          done

      - name: Run diagnostics
        if: steps.ssh_test.outputs.ssh_ok == 'true' || steps.reboot.outputs.rebooted == 'true'
        run: |
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            root@"$VPS_HOST" 'bash -s' <<'DIAG'
          set +e
          echo "=== SYSTEM INFO ==="
          uname -a
          uptime
          echo ""

          echo "=== MEMORY ==="
          free -h
          echo ""

          echo "=== DISK ==="
          df -h
          echo ""

          echo "=== OOM KILLER HISTORY ==="
          dmesg 2>/dev/null | grep -i "oom\|out of memory\|killed process" | tail -30 || journalctl -k --no-pager 2>/dev/null | grep -i "oom\|out of memory\|killed process" | tail -30 || echo "no oom entries found"
          echo ""

          echo "=== DOCKER STATS ==="
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.BlockIO}}" 2>/dev/null || echo "docker stats failed"
          echo ""

          echo "=== DOCKER PS ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>/dev/null || echo "docker ps failed"
          echo ""

          echo "=== DOCKER DISK USAGE ==="
          docker system df -v 2>/dev/null || echo "docker system df failed"
          echo ""

          echo "=== PRODUCTION DOCKER-COMPOSE.YML ==="
          cat /opt/coroot/docker-compose.yml 2>/dev/null || echo "file not found"
          echo ""

          echo "=== PRODUCTION CADDYFILE ==="
          cat /opt/coroot/Caddyfile 2>/dev/null || echo "file not found"
          echo ""

          echo "=== RECENT COROOT LOGS ==="
          docker compose -p coroot -f /opt/coroot/docker-compose.yml logs --tail 50 coroot 2>/dev/null || echo "no logs"
          echo ""

          echo "=== RECENT CLICKHOUSE LOGS ==="
          docker compose -p coroot -f /opt/coroot/docker-compose.yml logs --tail 50 clickhouse 2>/dev/null || echo "no logs"
          echo ""

          echo "=== RECENT PROMETHEUS LOGS ==="
          docker compose -p coroot -f /opt/coroot/docker-compose.yml logs --tail 50 prometheus 2>/dev/null || echo "no logs"
          echo ""

          echo "=== RECENT CADDY LOGS ==="
          docker compose -p coroot -f /opt/coroot/docker-compose.yml logs --tail 30 caddy 2>/dev/null || echo "no logs"
          echo ""

          echo "=== DOCKER EVENTS (LAST 24H) ==="
          docker events --since 24h --until 0s --format '{{.Time}} {{.Type}} {{.Action}} {{.Actor.Attributes.name}}' 2>/dev/null | tail -50 || echo "docker events failed"
          echo ""

          echo "=== SWAP ==="
          swapon --show 2>/dev/null || echo "no swap"
          echo ""

          echo "=== TOP MEMORY CONSUMERS ==="
          ps aux --sort=-%mem | head -15
          echo ""

          echo "=== DIAGNOSTICS COMPLETE ==="
          DIAG
